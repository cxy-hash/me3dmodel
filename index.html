<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>我的3D模型</title>
    <!-- 引入 Google 的 model-viewer 组件 -->
    <script type="importmap">
        {
            "imports": {
                "@google/model-viewer": "https://unpkg.com/@google/model-viewer@3.0.0/dist/model-viewer.min.js"
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: sans-serif;
        }
        model-viewer {
            width: 100%;
            height: 100vh;
            background-color: #f5f5f5;
        }
        /* 可选：添加一个简单的提示 */
        .info {
            position: absolute;
            bottom: 15px;
            left: 0;
            right: 0;
            text-align: center;
            color: #666;
            background: rgba(255,255,255,0.8);
            padding: 5px;
            font-size: 12px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <!-- 这里 src 要改成你的模型文件名 -->
    <model-viewer 
        src="cxy.glb" 
        alt="3D模型" 
        auto-rotate 
        camera-controls 
        interaction-prompt="auto"
        style="width:100%; height:100vh;">
    </model-viewer>
    <div class="info">手指拖动旋转 | 双指缩放</div>
</body>
</html>
